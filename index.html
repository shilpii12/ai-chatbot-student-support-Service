<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot for Student Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:400px;
    height:650px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

#chat-box{
    height:510px;
    overflow-y:auto;
    padding:15px;
    background:#1f2937;
}

.message{
    display:flex;
    margin:10px 0;
}

.message.user{
    justify-content:flex-end;
}

.message.bot{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:12px 16px;
    border-radius:18px;
    font-size:15px;
    line-height:1.5;
    word-wrap:break-word;
}

.user .bubble{
    background:#2563eb;
    color:white;
}

.bot .bubble{
    background:#374151;
    color:white;
}

.input-area{
    display:flex;
    padding:12px;
    background:#111827;
    border-top:1px solid #374151;
}

input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#bdbdbd;
}

button{
margin-left:8px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#10a37f;
color:white;
cursor:pointer;
font-size:15px;
font-weight:bold;
transition:.3s;
}

button:hover{
background:#0d8a6a;
}

#chat-box::-webkit-scrollbar{
    width:6px;
}

#chat-box::-webkit-scrollbar-thumb{
    background:#555;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🤖 AI Chatbot for Student Support
</div>

<div id="chat-box"></div>

<div class="input-area">

<input
type="text"
id="message"
placeholder="Speak or type your question..."
onkeypress="if(event.key==='Enter')sendMessage()">

<button onclick="startListening()">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>


// Voice Input
function startListening() {

if (!('webkitSpeechRecognition' in window)) {
    alert("Speech Recognition is not supported in this browser.");
    return;
}

const recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";
recognition.continuous = false;
recognition.interimResults = false;

recognition.onstart = function () {
    console.log("Listening...");
};

recognition.onresult = function (event) {
    document.getElementById("message").value =
        event.results[0][0].transcript;
};

recognition.onerror = function (event) {
    console.log(event.error);

    if(event.error=="not-allowed"){
        alert("Please allow microphone permission.");
    }
    else if(event.error=="network"){
        alert("Network error. Open the chatbot in Google Chrome and check your internet connection.");
    }
};

recognition.start();

}


// Send Message
async function sendMessage(){

const input = document.getElementById("message");
const text = input.value.trim();

if(text==="") return;

const chat = document.getElementById("chat-box");

chat.innerHTML += `
<div class="message user">
<div class="bubble">👤 ${text}</div>
</div>
`;

input.value="";
chat.scrollTop = chat.scrollHeight;

try{

const response = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data = await response.json();

chat.innerHTML += `
<div class="message bot">
<div class="bubble">🤖 ${data.reply}</div>
</div>
`;

chat.scrollTop = chat.scrollHeight;

}catch(error){

chat.innerHTML += `
<div class="message bot">
<div class="bubble">🤖 Error connecting to server.</div>
</div>
`;

}
}
</script>
</body>
</html>
